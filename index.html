<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smile Detection Challenge</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
text-align:center;
color:white;
overflow:hidden;

background:linear-gradient(-45deg,#ff9a9e,#fecfef,#fcb69f,#ffdde1);
background-size:400% 400%;
animation:bgmove 12s ease infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
margin-top:80px;
}

.progress{
width:320px;
height:14px;
background:rgba(255,255,255,0.3);
border-radius:20px;
margin:25px auto;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:white;
border-radius:20px;
transition:width 0.2s;
}

#instruction{
font-size:15px;
opacity:0.9;
}

.hidden{
display:none;
}

#puzzle{
width:300px;
margin:30px auto;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:2px;
}

.piece{
width:100px;
height:100px;
background-size:300px 300px;
cursor:pointer;
border-radius:6px;
transition:transform 0.2s;
}

.piece:hover{
transform:scale(1.05);
}

#doneBtn{
margin-top:20px;
padding:10px 22px;
font-size:16px;
border:none;
border-radius:25px;
background:white;
color:#ff4f9c;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
transition:0.3s;
}

#doneBtn:hover{
transform:scale(1.1);
}

.final{
margin-top:30px;
font-size:24px;
line-height:1.6;
}

.heart{
position:absolute;
font-size:26px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0;}
50%{opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

.sparkle{
position:absolute;
bottom:0;
font-size:16px;
animation:spark 3s linear infinite;
}

@keyframes spark{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-200px);opacity:0;}
}

</style>
</head>

<body>

<div class="container">

<h2 id="title">Initializing Smile Detection System...</h2>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="instruction">The more you smile, the faster it fills 🙂</div>

<div id="puzzle" class="hidden"></div>

<button id="doneBtn" class="hidden" onclick="finishPuzzle()">Puzzle Completed ✔</button>

<div id="final" class="hidden final"></div>

</div>

<script>

let bar=document.getElementById("bar")
let progress=0
let puzzle=document.getElementById("puzzle")
let final=document.getElementById("final")

function startLoading(){

let interval=setInterval(()=>{

progress+=1
bar.style.width=progress+"%"

if(progress==40){
document.getElementById("title").innerText="Scanning happiness levels..."
}

if(progress==75){
document.getElementById("title").innerText="Smile detected 🙂"
}

if(progress>=100){
clearInterval(interval)
startPuzzle()
}

},80)

}

function startPuzzle(){

document.getElementById("title").innerText="Final Step: Complete the Puzzle"

document.querySelector(".progress").classList.add("hidden")
document.getElementById("instruction").classList.add("hidden")

puzzle.classList.remove("hidden")
document.getElementById("doneBtn").classList.remove("hidden")

createPuzzle()

}

function createPuzzle(){

const img="photo.jpg"

let pieces=[]

for(let y=0;y<3;y++){
for(let x=0;x<3;x++){

let div=document.createElement("div")

div.className="piece"
div.style.backgroundImage=`url(${img})`
div.style.backgroundPosition=`-${x*100}px -${y*100}px`

pieces.push(div)

}
}

pieces.sort(()=>Math.random()-0.5)

pieces.forEach(p=>puzzle.appendChild(p))

let first=null

puzzle.onclick=(e)=>{

if(!e.target.classList.contains("piece")) return

if(!first){
first=e.target
first.style.opacity="0.6"
}else{

let second=e.target

let temp=first.style.backgroundPosition
first.style.backgroundPosition=second.style.backgroundPosition
second.style.backgroundPosition=temp

first.style.opacity="1"
first=null

}

}

}

function finishPuzzle(){

puzzle.classList.add("hidden")
document.getElementById("doneBtn").classList.add("hidden")

showCelebration()

}

function showCelebration(){

final.classList.remove("hidden")

final.innerHTML="🎉 Puzzle Completed!<br><br>System update complete.<br>Keep smiling Khushi the world looks better when you do."

confetti({
particleCount:220,
spread:80,
origin:{y:0.6}
})

setInterval(createHeart,400)
setInterval(createSparkle,250)

}

function createHeart(){

let heart=document.createElement("div")

heart.className="heart"
heart.innerHTML="💗"

heart.style.left=Math.random()*100+"vw"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),6000)

}

function createSparkle(){

let spark=document.createElement("div")

spark.className="sparkle"
spark.innerHTML="✨"

spark.style.left=Math.random()*100+"vw"

document.body.appendChild(spark)

setTimeout(()=>spark.remove(),3000)

}

startLoading()

</script>

</body>
</html>
