<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smile Detection Challenge</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
overflow:hidden;

background:linear-gradient(-45deg,#ff9a9e,#fecfef,#fcb69f,#ffdde1);
background-size:400% 400%;
animation:bgmove 12s ease infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
margin-top:80px;
}

.progress{
width:320px;
height:14px;
background:rgba(255,255,255,0.3);
border-radius:20px;
margin:25px auto;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:white;
border-radius:20px;
transition:width 0.2s;
}

#instruction{
font-size:15px;
}

#puzzle{
width:300px;
margin:30px auto;
display:none;
grid-template-columns:repeat(3,1fr);
gap:2px;
}

.piece{
width:100px;
height:100px;
border:1px solid black;
background-size:300px 300px;
cursor:pointer;
border-radius:6px;
}

#doneBtn{
display:none;
margin-top:20px;
padding:10px 25px;
font-size:18px;
border:none;
border-radius:25px;
background:white;
color:#ff4f9c;
cursor:pointer;
}

#final{
display:none;
font-size:24px;
margin-top:40px;
}

.heart{
position:absolute;
font-size:26px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0;}
50%{opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

.sparkle{
position:absolute;
bottom:0;
font-size:18px;
animation:spark 3s linear infinite;
}

@keyframes spark{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-200px);opacity:0;}
}

</style>
</head>

<body>

<div class="container">

<h2 id="title">Initializing Smile Detection System...</h2>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="instruction">The faster you smile, the faster it fills 🙂</div>

<div id="puzzle"></div>

<button id="doneBtn">Finish Puzzle ✔</button>

<div id="final"></div>

</div>

<script>

let bar=document.getElementById("bar")
let puzzle=document.getElementById("puzzle")
let doneBtn=document.getElementById("doneBtn")
let final=document.getElementById("final")

let progress=0

function startLoading(){

let interval=setInterval(()=>{

progress+=1
bar.style.width=progress+"%"

if(progress==40){
title.innerText="Scanning happiness levels....."
}

if(progress==75){
title.innerText="Smile detected 🙂"
}

if(progress>=100){

clearInterval(interval)

startPuzzle()

}

},70)

}

function startPuzzle(){

title.innerText="Complete the Puzzle"

document.querySelector(".progress").style.display="none"
instruction.style.display="none"

puzzle.style.display="grid"
doneBtn.style.display="inline-block"

createPuzzle()

}

function createPuzzle(){

< img src="image/photo.jpg">

let pieces=[]

for(let y=0;y<3;y++){
for(let x=0;x<3;x++){

let div=document.createElement("div")

div.className="piece"

div.style.backgroundImage=`url(${img})`
div.style.backgroundPosition=`-${x*100}px -${y*100}px`

pieces.push(div)

}
}

pieces.sort(()=>Math.random()-0.5)

pieces.forEach(p=>puzzle.appendChild(p))

let first=null

puzzle.onclick=(e)=>{

if(!e.target.classList.contains("piece")) return

if(!first){

first=e.target
first.style.opacity="0.5"

}else{

let second=e.target

let temp=first.style.backgroundPosition
first.style.backgroundPosition=second.style.backgroundPosition
second.style.backgroundPosition=temp

first.style.opacity="1"
first=null

}

}

}

doneBtn.onclick=function(){

puzzle.style.display="none"
doneBtn.style.display="none"

showCelebration()

}

function showCelebration(){

final.style.display="block"

final.innerHTML="🎉 Puzzle Completed!<br><br>System update complete.<br>Keep smiling — the world looks better when you do."

confetti({
particleCount:200,
spread:80,
origin:{y:0.6}
})

setInterval(createHeart,400)
setInterval(createSparkle,250)

}

function createHeart(){

let heart=document.createElement("div")

heart.className="heart"
heart.innerHTML="💗"

heart.style.left=Math.random()*100+"vw"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),6000)

}

function createSparkle(){

let spark=document.createElement("div")

spark.className="sparkle"
spark.innerHTML="✨"

spark.style.left=Math.random()*100+"vw"

document.body.appendChild(spark)

setTimeout(()=>spark.remove(),3000)

}

startLoading()

</script>

</body>
</html>
