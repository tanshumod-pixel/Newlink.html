<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smile Detection Challenge</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.container{
margin-top:80px;
}

.progress{
width:320px;
height:12px;
background:#1e293b;
border-radius:10px;
margin:20px auto;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:#38bdf8;
border-radius:10px;
transition:width 0.2s linear;
}

#instruction{
color:#94a3b8;
font-size:14px;
margin-top:10px;
}

.hidden{
display:none;
}

#puzzle{
width:300px;
margin:30px auto;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:2px;
}

.piece{
width:100px;
height:100px;
background-size:300px 300px;
border:1px solid #1e293b;
cursor:pointer;
}

.final{
margin-top:40px;
font-size:22px;
}

</style>
</head>

<body>

<div class="container">

<h2 id="title">Initializing Smile Detection System...</h2>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="instruction">More you smile the faster it fills 🙂</div>

<div id="puzzle" class="hidden"></div>

<div id="final" class="hidden final"></div>

</div>

<script>

let bar=document.getElementById("bar")
let progress=0
let puzzle=document.getElementById("puzzle")
let final=document.getElementById("final")

function fillBar(){

let interval=setInterval(()=>{

progress+=1
bar.style.width=progress+"%"

if(progress==40){
document.getElementById("title").innerText="Scanning happiness levels..."
}

if(progress==70){
document.getElementById("title").innerText="Smile detected 🙂"
}

if(progress>=100){
clearInterval(interval)
startPuzzle()
}

},70)

}

function startPuzzle(){

document.getElementById("title").innerText="Final Step: Complete the Puzzle"

document.querySelector(".progress").classList.add("hidden")
document.getElementById("instruction").classList.add("hidden")

puzzle.classList.remove("hidden")

createPuzzle()

}

function createPuzzle(){

const img="image/photo.jpg"

let pieces=[]

for(let y=0;y<3;y++){
for(let x=0;x<3;x++){

let div=document.createElement("div")
div.className="piece"

div.style.backgroundImage=`url(${img})`
div.style.backgroundPosition=`-${x*100}px -${y*100}px`

div.dataset.correct=y*3+x

pieces.push(div)

}
}

pieces.sort(()=>Math.random()-0.5)

pieces.forEach(p=>puzzle.appendChild(p))

let first=null

puzzle.addEventListener("click",e=>{

if(!e.target.classList.contains("piece")) return

if(!first){
first=e.target
first.style.opacity="0.6"
}else{

let second=e.target

let temp=first.style.backgroundPosition
first.style.backgroundPosition=second.style.backgroundPosition
second.style.backgroundPosition=temp

first.style.opacity="1"
first=null

checkPuzzle()

}

})

}

function checkPuzzle(){

let correct=true

document.querySelectorAll(".piece").forEach((p,i)=>{

let correctX=(p.dataset.correct%3)*100
let correctY=Math.floor(p.dataset.correct/3)*100

let pos=p.style.backgroundPosition

if(pos!=`-${correctX}px -${correctY}px`) correct=false

})

if(correct){

puzzle.classList.add("hidden")

final.classList.remove("hidden")

final.innerHTML="🎉 Puzzle Completed!<br><br>System update complete.<br>Keep smiling Khushi the world looks better when you do."

confetti({
particleCount:150,
spread:70,
origin:{y:0.6}
})

}

}

fillBar()

</script>

</body>
</html>
